apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  params:
    - description: The URL to the git repo
      name: GIT_REPO
      type: string
    - default: master
      description: The reference (branch or ref)
      name: GIT_REF
      type: string
    - default: python:3.12-slim
      description: Base image used by lint and test tasks
      name: IMAGE
      type: string
  tasks:
    - name: git-clone
      params:
        - name: URL
          value: $(params.GIT_REPO)
        - name: REVISION
          value: $(params.GIT_REF)
        - name: DELETE_EXISTING
          value: 'true'
        - name: SSL_VERIFY
          value: 'true'
        - name: SUBMODULES
          value: 'true'
        - name: DEPTH
          value: '1'
        - name: VERBOSE
          value: 'false'
      taskRef:
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
        resolver: cluster
      workspaces:
        - name: output
          workspace: pipeline-workspace
    - name: unit-tests
      runAfter:
        - git-clone
      taskRef:
        name: run-unit-tests
    - name: lint
      runAfter:
        - git-clone
      taskRef:
        name: lint
      params:
        - name: IMAGE
          value: $(params.IMAGE)
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: sample
      runAfter:
        - unit-tests
        - lint
      taskRef:
        name: sample
      workspaces:
        - name: source
          workspace: pipeline-workspace
  workspaces:
    - name: pipeline-workspace
