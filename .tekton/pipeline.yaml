apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  params:
    - description: The URL to the git repo
      name: GIT_REPO
      type: string
    - default: master
      description: The reference (branch or ref)
      name: GIT_REF
      type: string
    - default: python:3.12-slim
      description: Base image used by the lint task
      name: IMAGE
      type: string
    - default: image-registry.openshift-image-registry.svc:5000
      description: Image registry host
      name: REGISTRY
      type: string
    - default: wishlist-service
      description: Image stream name to build and push
      name: IMAGE_NAME
      type: string
    - default: latest
      description: Image tag to build and push
      name: IMAGE_TAG
      type: string
    - default: ./Dockerfile
      description: Path to the Dockerfile to build
      name: DOCKERFILE
      type: string
    - default: .
      description: Build context path
      name: CONTEXT
      type: string
    - default: "false"
      description: Verify TLS when pushing to the image registry
      name: TLSVERIFY
      type: string
    - default: docker
      description: Image manifest format
      name: FORMAT
      type: string
    - default: vfs
      description: Buildah storage driver
      name: STORAGE_DRIVER
      type: string
    - default: quay.io/openshift/origin-cli:4.18
      description: OpenShift CLI image used by the deploy task
      name: DEPLOYER_IMAGE
      type: string
    - default: quay.io/rofrano/pipeline-selenium:sp26
      description: Image used to run Behave and Selenium BDD tests
      name: BEHAVE_IMAGE
      type: string
    - default: ""
      description: Base URL of the deployed Wishlist service UI
      name: BASE_URL
      type: string
    - default: "30"
      description: Seconds Selenium should wait for UI elements
      name: WAIT_SECONDS
      type: string
    - default: chrome
      description: Browser driver used by Selenium
      name: DRIVER
      type: string
  tasks:
    - name: git-clone
      params:
        - name: URL
          value: $(params.GIT_REPO)
        - name: REVISION
          value: $(params.GIT_REF)
        - name: DELETE_EXISTING
          value: "true"
        - name: SSL_VERIFY
          value: "true"
        - name: SUBMODULES
          value: "true"
        - name: DEPTH
          value: "1"
        - name: VERBOSE
          value: "false"
      taskRef:
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
        resolver: cluster
      workspaces:
        - name: output
          workspace: pipeline-workspace
    - name: unit-tests
      runAfter:
        - git-clone
      taskRef:
        name: run-unit-tests
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: lint
      runAfter:
        - git-clone
      taskRef:
        name: lint
      params:
        - name: IMAGE
          value: $(params.IMAGE)
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: buildah
      runAfter:
        - unit-tests
        - lint
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.REGISTRY)/$(context.pipelineRun.namespace)/$(params.IMAGE_NAME):$(params.IMAGE_TAG)
        - name: DOCKERFILE
          value: $(params.DOCKERFILE)
        - name: CONTEXT
          value: $(params.CONTEXT)
        - name: TLSVERIFY
          value: $(params.TLSVERIFY)
        - name: FORMAT
          value: $(params.FORMAT)
        - name: STORAGE_DRIVER
          value: $(params.STORAGE_DRIVER)
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: deploy
      runAfter:
        - buildah
      taskRef:
        name: deploy
      params:
        - name: IMAGE
          value: $(params.REGISTRY)/$(context.pipelineRun.namespace)/$(params.IMAGE_NAME)@$(tasks.buildah.results.IMAGE_DIGEST)
        - name: CLI_IMAGE
          value: $(params.DEPLOYER_IMAGE)
        - name: BASE_URL
          value: $(params.BASE_URL)
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: behave
      runAfter:
        - deploy
      taskRef:
        name: behave
      params:
        - name: IMAGE
          value: $(params.BEHAVE_IMAGE)
        - name: BASE_URL
          value: $(tasks.deploy.results.BASE_URL)
        - name: WAIT_SECONDS
          value: $(params.WAIT_SECONDS)
        - name: DRIVER
          value: $(params.DRIVER)
      workspaces:
        - name: source
          workspace: pipeline-workspace
  workspaces:
    - name: pipeline-workspace
