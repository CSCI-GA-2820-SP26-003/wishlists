apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-unit-tests
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/categories: Testing
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/tags: python, pytest
    tekton.dev/displayName: "pytest tests"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This task performs unit tests with pytest and detects Pipfile,
    poetry.lock, or requirements.txt based projects.
    It also sets DATABASE_URI so the tests can run without a live PostgreSQL service.
  params:
    - name: image
      description: The container image used to run the tests.
      type: string
      default: quay.io/rofrano/nyu-devops-base:sp26
    - name: pytest-args
      description: The arguments to pass to the pytest CLI.
      type: array
      default: []
    - name: database-uri
      description: Database URI used during the test run.
      type: string
      default: sqlite:////tmp/wishlists-test.db
  workspaces:
    - name: source
      description: The workspace with the source code.
  steps:
    - name: pytest
      image: $(params.image)
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: $(params.database-uri)
        - name: PIPENV_VENV_IN_PROJECT
          value: "0"
        - name: WORKON_HOME
          value: /tmp/pipenv-unit-tests
      script: |
        #!/bin/bash
        set -euo pipefail
        export PATH="$PATH:$HOME/.local/bin"

        echo "***** Installing dependencies *****"
        if [ -e "poetry.lock" ]; then
          echo "Found poetry.lock file: using poetry ..."
          python -m pip install --user --upgrade pip poetry
          poetry install
        elif [ -e "Pipfile" ]; then
          echo "Found Pipfile file: using pipenv ..."
          python -m pip install --user --upgrade pip pipenv
          python -m pipenv sync --dev
        elif [ -e "requirements.txt" ]; then
          python -m pip install --user -r requirements.txt
        fi

        echo "***** Running Tests *****"
        if [ -e "Pipfile" ]; then
          python -m pipenv run pytest --version
          python -m pipenv run pytest "$@"
        else
          python -m pip install --user pytest pytest-cov pytest-pspec
          pytest --version
          pytest "$@"
        fi
      args:
        - "$(params.pytest-args[*])"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  params:
    - name: IMAGE
      type: string
      default: python:3.12-slim
  workspaces:
    - name: source
  steps:
    - name: run-lint
      image: $(params.IMAGE)
      workingDir: $(workspaces.source.path)
      env:
        - name: PIPENV_VENV_IN_PROJECT
          value: "0"
        - name: WORKON_HOME
          value: /tmp/pipenv-lint
      script: |
        #!/usr/bin/env bash
        set -e
        python -m pip install --upgrade pip pipenv
        pipenv install --dev
        status=0
        pipenv run flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics || status=$?
        pipenv run flake8 service tests --count --max-complexity=10 --max-line-length=127 --statistics || status=$?
        pipenv run pylint service tests --max-line-length=127 || status=$?
        exit $status
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: buildah
spec:
  description: Build and push the Wishlist service container image with Buildah.
  params:
    - name: IMAGE
      type: string
      description: Fully qualified image name to build and push.
    - name: BUILDER_IMAGE
      type: string
      description: Buildah image used to build and push the container image.
      default: quay.io/buildah/stable:latest
    - name: DOCKERFILE
      type: string
      description: Path to the Dockerfile.
      default: ./Dockerfile
    - name: CONTEXT
      type: string
      description: Path to the build context.
      default: .
    - name: TLSVERIFY
      type: string
      description: Verify TLS when pushing to the image registry.
      default: "false"
    - name: FORMAT
      type: string
      description: Image manifest format.
      default: docker
    - name: STORAGE_DRIVER
      type: string
      description: Buildah storage driver.
      default: vfs
    - name: BUILD_EXTRA_ARGS
      type: string
      description: Extra arguments passed to buildah bud.
      default: ""
    - name: PUSH_EXTRA_ARGS
      type: string
      description: Extra arguments passed to buildah push.
      default: ""
    - name: SKIP_PUSH
      type: string
      description: Skip pushing the image after the build.
      default: "false"
  results:
    - name: IMAGE_DIGEST
      type: string
      description: Digest of the image that was pushed.
  workspaces:
    - name: source
      description: Workspace containing the source code to build.
  stepTemplate:
    env:
      - name: HOME
        value: /tekton/home
    securityContext:
      capabilities:
        add:
          - SETFCAP
  steps:
    - name: build-and-push
      image: $(params.BUILDER_IMAGE)
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Running Buildah as:"
        id

        buildah --storage-driver=$(params.STORAGE_DRIVER) bud \
          $(params.BUILD_EXTRA_ARGS) \
          --format=$(params.FORMAT) \
          --tls-verify=$(params.TLSVERIFY) \
          --layers \
          -f $(params.DOCKERFILE) \
          -t $(params.IMAGE) \
          $(params.CONTEXT)

        if [[ "$(params.SKIP_PUSH)" == "true" ]]; then
          echo "Push skipped"
          exit 0
        fi

        buildah --storage-driver=$(params.STORAGE_DRIVER) push \
          $(params.PUSH_EXTRA_ARGS) \
          --tls-verify=$(params.TLSVERIFY) \
          --digestfile $(workspaces.source.path)/image-digest \
          $(params.IMAGE) \
          docker://$(params.IMAGE)

        cat $(workspaces.source.path)/image-digest | tee $(results.IMAGE_DIGEST.path)
      volumeMounts:
        - name: varlibcontainers
          mountPath: /tekton/home/.local/share/containers
  volumes:
    - name: varlibcontainers
      emptyDir: {}
